<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nilam Auto</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 320px;
      background: #fff;
      color: #1a1a2e;
    }
    .header {
      background: linear-gradient(135deg, #6C5CE7, #a29bfe);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 18px; color: #fff;
    }
    .header-text h1 { color: #fff; font-size: 16px; font-weight: 700; }
    .header-text p  { color: rgba(255,255,255,0.75); font-size: 12px; margin-top: 2px; }

    .body { padding: 14px 16px; }

    .status-box {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 12px; border-radius: 8px;
      font-size: 12px; margin-bottom: 14px; line-height: 1.4;
    }
    .status-box.ok    { background: #f0fdf4; color: #166534; }
    .status-box.warn  { background: #fefce8; color: #854d0e; }
    .status-box.info  { background: #f0f4ff; color: #3730a3; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
    .dot.green  { background: #22c55e; }
    .dot.yellow { background: #eab308; }
    .dot.purple { background: #6C5CE7; }

    .field-group { margin-bottom: 12px; }
    label {
      display: block; font-size: 12px; font-weight: 600;
      color: #374151; margin-bottom: 3px;
    }
    .hint { font-size: 11px; color: #9ca3af; margin-bottom: 5px; }
    input {
      width: 100%; padding: 8px 10px;
      border: 1.5px solid #e5e7eb; border-radius: 7px;
      font-size: 13px; outline: none;
    }
    input:focus { border-color: #6C5CE7; }

    .cookie-preview {
      background: #f9fafb; border: 1px solid #e5e7eb;
      border-radius: 6px; padding: 6px 10px;
      font-size: 10px; color: #6b7280; margin-bottom: 12px;
      word-break: break-all; max-height: 50px; overflow: hidden;
      display: none;
    }
    .cookie-preview.visible { display: block; }

    button {
      width: 100%; padding: 10px;
      background: #6C5CE7; color: #fff;
      font-size: 13px; font-weight: 600;
      border: none; border-radius: 8px; cursor: pointer;
      transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: #5a47d4; }
    button:disabled { background: #a29bfe; cursor: not-allowed; }

    .msg {
      margin-top: 10px; padding: 8px 12px;
      border-radius: 7px; font-size: 12px; text-align: center;
    }
    .msg.success { background: #f0fdf4; color: #166534; }
    .msg.error   { background: #fef2f2; color: #991b1b; }

    .footer {
      border-top: 1px solid #f3f4f6;
      padding: 10px 16px;
      font-size: 11px; color: #9ca3af; text-align: center;
    }
    .saved-time {
      font-size: 11px; color: #9ca3af;
      text-align: center; margin-top: 8px; display: none;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">N</div>
  <div class="header-text">
    <h1>Nilam Auto</h1>
    <p>AINS Session Capture</p>
  </div>
</div>

<div class="body">

  <div id="status-box" class="status-box info">
    <div class="dot purple"></div>
    <span id="status-text">Checking AINS login status...</span>
  </div>

  <div class="field-group">
    <label for="userIdentifier">Your Nilam Auto Email</label>
    <div class="hint">Use the email you registered with on Nilam Auto</div>
    <input
      type="email"
      id="userIdentifier"
      placeholder="e.g. teacher@school.edu.my"
      autocomplete="off"
      spellcheck="false"
    />
  </div>

  <div style="display:flex; gap:6px;">
    <button id="saveBtn" disabled style="flex:1;">Save Session</button>
    <button id="saveAndSubmitBtn" disabled style="flex:1; background:#1a1a2e;">Save & Submit</button>
  </div>
  <div style="font-size:10px; color:#9ca3af; text-align:center; margin-top:4px;">
    Use "Save & Submit" to submit immediately while session is fresh
  </div>

  <div id="msg" class="msg" style="display:none"></div>
  <div id="savedTime" class="saved-time"></div>

  <!-- Last submission status -->
  <div id="submissionCard" style="display:none; margin-top:14px; border:1px solid #e5e7eb; border-radius:8px; overflow:hidden;">
    <div style="background:#f9fafb; padding:8px 12px; font-size:11px; font-weight:600; color:#6b7280; text-transform:uppercase; letter-spacing:0.05em;">
      Last Submission
    </div>
    <div style="padding:10px 12px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
        <span id="subBook" style="font-size:12px; font-weight:600; color:#1a1a2e; flex:1; margin-right:8px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">—</span>
        <span id="subBadge" style="font-size:10px; font-weight:700; padding:2px 8px; border-radius:99px; flex-shrink:0;"></span>
      </div>
      <div id="subDate" style="font-size:11px; color:#9ca3af;"></div>
    </div>
  </div>

  <!-- Standalone Submit -->
  <div style="margin-top:12px;">
    <button id="triggerBtn" disabled style="background:#374151;">
      Submit Records Now
    </button>
    <div id="triggerMsg" class="msg" style="display:none; margin-top:8px;"></div>
  </div>

</div>

<div class="footer">
  Must be logged in to <strong>ains.moe.gov.my</strong> before saving.
</div>

<script src="popup.js"></script>
</body>
</html>
